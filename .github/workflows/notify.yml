name: Notify requester on approval decision

on:
  issues:
    types: [labeled]

jobs:
  notify:
    runs-on: ubuntu-latest
    # Only fire when an approval decision label is applied
    if: |
      github.event.label.name == 'approval: approved' ||
      github.event.label.name == 'approval: rejected'
    steps:
      - name: Comment on issue with decision
        uses: actions/github-script@v7
        with:
          script: |
            const label  = context.payload.label.name;
            const approved = label === 'approval: approved';
            const status   = approved ? '**approved** ✅' : '**rejected** ❌';
            const body     = approved
              ? `Your request has been ${status} by an admin.\n\nYou will receive this comment as a GitHub notification/email. If you have any follow-up questions, feel free to comment on this issue.`
              : `Your request has been ${status} by an admin.\n\nIf you believe this was in error or have additional context, feel free to submit a new request or comment here.`;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
